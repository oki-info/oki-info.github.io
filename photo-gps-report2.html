<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>現場写真 GPSマッピングレポート</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@300;400;500;700&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>

<style>
  :root {
    --bg: #0f1117;
    --surface: #1a1d27;
    --surface2: #22263a;
    --border: #2e3450;
    --accent: #4f8ef7;
    --accent2: #f74f6e;
    --text: #e8eaf0;
    --text2: #8b90a8;
    --success: #3dd68c;
    --warn: #f7b84f;
    --card-shadow: 0 4px 24px rgba(0,0,0,0.4);
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Noto Sans JP', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
  }

  /* ── HEADER ── */
  header {
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    padding: 16px 28px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    position: sticky;
    top: 0;
    z-index: 100;
  }
  .logo {
    display: flex;
    align-items: center;
    gap: 10px;
  }
  .logo-icon {
    width: 32px; height: 32px;
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    border-radius: 8px;
    display: flex; align-items: center; justify-content: center;
    font-size: 16px;
  }
  .logo-text {
    font-size: 14px;
    font-weight: 700;
    letter-spacing: 0.05em;
    color: var(--text);
  }
  .logo-sub {
    font-size: 10px;
    color: var(--text2);
    font-family: 'JetBrains Mono', monospace;
    letter-spacing: 0.1em;
  }
  .header-actions {
    display: flex;
    gap: 10px;
    align-items: center;
  }

  /* ── BUTTONS ── */
  .btn {
    border: none;
    border-radius: 8px;
    cursor: pointer;
    font-family: inherit;
    font-weight: 500;
    transition: all 0.2s;
    display: flex;
    align-items: center;
    gap: 6px;
  }
  .btn-primary {
    background: var(--accent);
    color: #fff;
    padding: 9px 18px;
    font-size: 13px;
  }
  .btn-primary:hover { background: #3a7be0; transform: translateY(-1px); }
  .btn-ghost {
    background: transparent;
    color: var(--text2);
    border: 1px solid var(--border);
    padding: 9px 16px;
    font-size: 13px;
  }
  .btn-ghost:hover { color: var(--text); border-color: var(--accent); }
  .btn-danger {
    background: rgba(247,79,110,0.15);
    color: var(--accent2);
    border: 1px solid rgba(247,79,110,0.3);
    padding: 7px 12px;
    font-size: 12px;
    border-radius: 6px;
  }
  .btn-danger:hover { background: rgba(247,79,110,0.25); }
  .btn:disabled { opacity: 0.4; cursor: not-allowed; transform: none !important; }

  /* ── MAIN ── */
  main { max-width: 1100px; margin: 0 auto; padding: 28px 20px; }

  /* ── UPLOAD AREA ── */
  .upload-section {
    margin-bottom: 28px;
  }
  .upload-zone {
    border: 2px dashed var(--border);
    border-radius: 16px;
    padding: 48px 28px;
    text-align: center;
    background: var(--surface);
    cursor: pointer;
    transition: all 0.25s;
    position: relative;
  }
  .upload-zone:hover, .upload-zone.drag-over {
    border-color: var(--accent);
    background: rgba(79,142,247,0.05);
  }
  .upload-zone input[type="file"] {
    position: absolute; inset: 0;
    opacity: 0; cursor: pointer; width: 100%; height: 100%;
  }
  .upload-icon { font-size: 40px; margin-bottom: 12px; }
  .upload-title { font-size: 16px; font-weight: 600; margin-bottom: 6px; }
  .upload-hint { font-size: 13px; color: var(--text2); }

  /* ── REPORT META ── */
  .meta-section {
    display: grid;
    grid-template-columns: 1fr 1fr 1fr;
    gap: 14px;
    margin-bottom: 28px;
  }
  .meta-field {
    background: var(--surface);
    border-radius: 12px;
    padding: 14px 16px;
    border: 1px solid var(--border);
  }
  .meta-label {
    font-size: 11px;
    color: var(--text2);
    letter-spacing: 0.08em;
    margin-bottom: 6px;
    text-transform: uppercase;
  }
  .meta-input {
    background: transparent;
    border: none;
    color: var(--text);
    font-family: inherit;
    font-size: 14px;
    width: 100%;
    outline: none;
  }
  .meta-input::placeholder { color: var(--text2); }

  /* ── SUMMARY BAR ── */
  .summary-bar {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 14px 20px;
    display: flex;
    align-items: center;
    gap: 20px;
    margin-bottom: 24px;
  }
  .summary-num {
    font-family: 'JetBrains Mono', monospace;
    font-size: 24px;
    font-weight: 600;
    color: var(--accent);
  }
  .summary-label { font-size: 12px; color: var(--text2); }
  .summary-sep { width: 1px; height: 32px; background: var(--border); }
  .stat-item { display: flex; flex-direction: column; align-items: center; }
  .stat-ok { color: var(--success); }
  .stat-ng { color: var(--accent2); }
  .spacer { flex: 1; }

  /* ── ITEMS ── */
  .items-list { display: flex; flex-direction: column; gap: 16px; }

  .photo-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 16px;
    overflow: hidden;
    transition: border-color 0.2s;
    animation: slideIn 0.3s ease;
  }
  @keyframes slideIn {
    from { opacity: 0; transform: translateY(12px); }
    to { opacity: 1; transform: translateY(0); }
  }
  .photo-card:hover { border-color: var(--accent); }

  .card-header {
    display: flex;
    align-items: center;
    padding: 12px 16px;
    background: var(--surface2);
    border-bottom: 1px solid var(--border);
    gap: 10px;
  }
  .card-num {
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    font-weight: 600;
    color: var(--accent);
    background: rgba(79,142,247,0.12);
    padding: 3px 8px;
    border-radius: 4px;
    min-width: 36px;
    text-align: center;
  }
  .card-filename {
    font-size: 13px;
    color: var(--text);
    flex: 1;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }
  .gps-badge {
    font-size: 11px;
    padding: 3px 9px;
    border-radius: 12px;
    font-family: 'JetBrains Mono', monospace;
  }
  .gps-ok { background: rgba(61,214,140,0.12); color: var(--success); border: 1px solid rgba(61,214,140,0.25); }
  .gps-ng { background: rgba(247,79,110,0.12); color: var(--accent2); border: 1px solid rgba(247,79,110,0.25); }

  .card-body {
    display: grid;
    grid-template-columns: 240px 1fr;
    gap: 0;
  }

  .photo-pane {
    padding: 14px;
    border-right: 1px solid var(--border);
    display: flex;
    flex-direction: column;
    gap: 10px;
  }
  .photo-thumb {
    width: 100%;
    aspect-ratio: 4/3;
    object-fit: cover;
    border-radius: 10px;
    display: block;
  }
  .photo-info {
    font-size: 11px;
    color: var(--text2);
    font-family: 'JetBrains Mono', monospace;
    line-height: 1.7;
  }
  .photo-info span { color: var(--text); }

  .map-pane {
    display: flex;
    flex-direction: column;
  }
  .map-container {
    flex: 1;
    min-height: 220px;
    position: relative;
    background: var(--bg);
  }
  .map-container iframe {
    width: 100%;
    height: 100%;
    min-height: 220px;
    border: none;
    display: block;
  }
  .no-gps-placeholder {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    height: 220px;
    color: var(--text2);
    font-size: 13px;
    gap: 8px;
  }
  .no-gps-placeholder .icon { font-size: 32px; opacity: 0.4; }

  .card-footer {
    border-top: 1px solid var(--border);
    padding: 10px 14px;
    display: flex;
    align-items: center;
    gap: 10px;
  }
  .note-input {
    flex: 1;
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 8px;
    color: var(--text);
    font-family: inherit;
    font-size: 13px;
    padding: 8px 12px;
    outline: none;
    transition: border-color 0.2s;
  }
  .note-input:focus { border-color: var(--accent); }
  .note-input::placeholder { color: var(--text2); }

  /* ── EMPTY STATE ── */
  .empty-state {
    text-align: center;
    padding: 60px 20px;
    color: var(--text2);
  }
  .empty-icon { font-size: 48px; margin-bottom: 12px; opacity: 0.4; }
  .empty-text { font-size: 14px; }

  /* ── LOADING SPINNER ── */
  .spinner {
    display: inline-block;
    width: 16px; height: 16px;
    border: 2px solid rgba(255,255,255,0.2);
    border-top-color: #fff;
    border-radius: 50%;
    animation: spin 0.7s linear infinite;
    vertical-align: middle;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* ── PDF EXPORT STYLES ── */
  @media print {
    body { background: white; color: black; }
    header .header-actions { display: none; }
    .upload-section { display: none; }
    .photo-card { break-inside: avoid; border: 1px solid #ccc; }
  }

  /* ── RESPONSIVE ── */
  @media (max-width: 640px) {
    .card-body { grid-template-columns: 1fr; }
    .photo-pane { border-right: none; border-bottom: 1px solid var(--border); }
    .meta-section { grid-template-columns: 1fr; }
  }
</style>
</head>
<body>

<header>
  <div class="logo">
    <div class="logo-icon">📍</div>
    <div>
      <div class="logo-text">GPS写真レポート</div>
      <div class="logo-sub">MULTI-LOCATION FIELD REPORT</div>
    </div>
  </div>
  <div class="header-actions">
    <button class="btn btn-ghost" id="clearBtn" onclick="clearAll()">🗑 クリア</button>
    <button class="btn btn-primary" id="pdfBtn" onclick="exportPDF()" disabled>
      <span id="pdfBtnText">📄 PDF出力</span>
    </button>
  </div>
</header>

<main>
  <!-- メタ情報 -->
  <div class="meta-section">
    <div class="meta-field">
      <div class="meta-label">報告タイトル</div>
      <input class="meta-input" id="reportTitle" type="text" placeholder="例：令和6年台風14号 被害状況調査">
    </div>
    <div class="meta-field">
      <div class="meta-label">報告者</div>
      <input class="meta-input" id="reportAuthor" type="text" placeholder="所属・氏名">
    </div>
    <div class="meta-field">
      <div class="meta-label">報告日時</div>
      <input class="meta-input" id="reportDate" type="text" id="reportDate">
    </div>
  </div>

  <!-- アップロード -->
  <div class="upload-section">
    <div class="upload-zone" id="dropZone">
      <input type="file" accept="image/*" multiple id="fileInput" onchange="handleFiles(this.files)">
      <div class="upload-icon">🖼️</div>
      <div class="upload-title">写真をドロップ、またはクリックして選択</div>
      <div class="upload-hint">GPS情報付きJPEG推奨 · 複数選択可 · 追加アップロード可</div>
    </div>
  </div>

  <!-- サマリーバー -->
  <div class="summary-bar" id="summaryBar" style="display:none">
    <div class="stat-item">
      <div class="summary-num" id="totalCount">0</div>
      <div class="summary-label">枚</div>
    </div>
    <div class="summary-sep"></div>
    <div class="stat-item">
      <div class="summary-num stat-ok" id="gpsOkCount">0</div>
      <div class="summary-label">GPS有</div>
    </div>
    <div class="summary-sep"></div>
    <div class="stat-item">
      <div class="summary-num stat-ng" id="gpsNgCount">0</div>
      <div class="summary-label">GPS無</div>
    </div>
    <div class="spacer"></div>
    <div style="font-size:12px;color:var(--text2)">地図はOpenStreetMap使用</div>
  </div>

  <!-- カードリスト -->
  <div class="items-list" id="itemsList">
    <div class="empty-state" id="emptyState">
      <div class="empty-icon">🗺️</div>
      <div class="empty-text">写真をアップロードすると<br>GPS座標と地図が自動表示されます</div>
    </div>
  </div>
</main>

<script>
// ─── EXIF GPS読み込み ───────────────────────────────────────────
function readExifGPS(file) {
  return new Promise(resolve => {
    const reader = new FileReader();
    reader.onload = e => {
      try {
        const arr = new Uint8Array(e.target.result);
        const gps = parseExifGPS(arr);
        resolve(gps);
      } catch { resolve(null); }
    };
    reader.readAsArrayBuffer(file.slice(0, 128 * 1024));
  });
}

function parseExifGPS(arr) {
  // JPEGマーカー確認
  if (arr[0] !== 0xFF || arr[1] !== 0xD8) return null;

  let offset = 2;
  while (offset < arr.length - 2) {
    if (arr[offset] !== 0xFF) break;
    const marker = arr[offset + 1];
    const length = (arr[offset + 2] << 8) | arr[offset + 3];

    if (marker === 0xE1) { // APP1 (Exif)
      const exifStart = offset + 4;
      const exifData = arr.slice(exifStart, exifStart + length - 2);
      const gps = extractGPSFromExif(exifData);
      if (gps) return gps;
    }
    offset += 2 + length;
  }
  return null;
}

function extractGPSFromExif(data) {
  const str = String.fromCharCode(...data.slice(0, 6));
  if (!str.startsWith('Exif')) return null;

  const isLittle = data[6] === 0x49;
  const read16 = o => isLittle ? data[o] | (data[o+1] << 8) : (data[o] << 8) | data[o+1];
  const read32 = o => isLittle ? data[o] | (data[o+1]<<8) | (data[o+2]<<16) | (data[o+3]<<24) : (data[o]<<24) | (data[o+1]<<16) | (data[o+2]<<8) | data[o+3];

  const base = 6;
  let ifdOffset = read32(base + 4);
  const count = read16(base + ifdOffset);

  let gpsIfdOffset = null;
  for (let i = 0; i < count; i++) {
    const eOff = base + ifdOffset + 2 + i * 12;
    const tag = read16(eOff);
    if (tag === 0x8825) {
      gpsIfdOffset = read32(eOff + 8);
      break;
    }
  }
  if (gpsIfdOffset === null) return null;

  const gpsCount = read16(base + gpsIfdOffset);
  const gpsData = {};
  for (let i = 0; i < gpsCount; i++) {
    const eOff = base + gpsIfdOffset + 2 + i * 12;
    const tag = read16(eOff);
    const type = read16(eOff + 2);
    const comp = read32(eOff + 4);
    const valOff = eOff + 8;

    if (type === 2 && comp <= 4) { // ASCII
      const dataOff = base + read32(valOff);
      gpsData[tag] = String.fromCharCode(...data.slice(dataOff, dataOff + comp - 1));
    } else if (type === 5) { // RATIONAL
      const dataOff = base + read32(valOff);
      const rationals = [];
      for (let r = 0; r < comp; r++) {
        const num = read32(dataOff + r * 8);
        const den = read32(dataOff + r * 8 + 4);
        rationals.push(den !== 0 ? num / den : 0);
      }
      gpsData[tag] = rationals;
    }
  }

  if (!gpsData[1] || !gpsData[2] || !gpsData[3] || !gpsData[4]) return null;

  const dms2dec = r => r[0] + r[1] / 60 + r[2] / 3600;
  let lat = dms2dec(gpsData[2]);
  let lng = dms2dec(gpsData[4]);
  if (gpsData[1] === 'S') lat = -lat;
  if (gpsData[3] === 'W') lng = -lng;

  if (isNaN(lat) || isNaN(lng) || lat === 0 || lng === 0) return null;
  return { lat: lat.toFixed(6), lng: lng.toFixed(6) };
}

function readExifDate(file) {
  return new Promise(resolve => {
    const reader = new FileReader();
    reader.onload = e => {
      try {
        const arr = new Uint8Array(e.target.result);
        const dt = extractDateTime(arr);
        resolve(dt);
      } catch { resolve(null); }
    };
    reader.readAsArrayBuffer(file.slice(0, 128 * 1024));
  });
}

function extractDateTime(arr) {
  if (arr[0] !== 0xFF || arr[1] !== 0xD8) return null;
  let offset = 2;
  while (offset < arr.length - 2) {
    if (arr[offset] !== 0xFF) break;
    const marker = arr[offset + 1];
    const length = (arr[offset + 2] << 8) | arr[offset + 3];
    if (marker === 0xE1) {
      const exifStart = offset + 4;
      const data = arr.slice(exifStart, exifStart + length - 2);
      const str = String.fromCharCode(...data.slice(0, 6));
      if (!str.startsWith('Exif')) break;
      const isLittle = data[6] === 0x49;
      const read16 = o => isLittle ? data[o] | (data[o+1] << 8) : (data[o] << 8) | data[o+1];
      const read32 = o => isLittle ? data[o] | (data[o+1]<<8) | (data[o+2]<<16) | (data[o+3]<<24) : (data[o]<<24) | (data[o+1]<<16) | (data[o+2]<<8) | data[o+3];
      const base = 6;
      const ifdOffset = read32(base + 4);
      const count = read16(base + ifdOffset);
      for (let i = 0; i < count; i++) {
        const eOff = base + ifdOffset + 2 + i * 12;
        const tag = read16(eOff);
        if (tag === 0x0132 || tag === 0x9003) { // DateTime / DateTimeOriginal
          const comp = read32(eOff + 4);
          const dataOff = comp <= 4 ? eOff + 8 : base + read32(eOff + 8);
          return String.fromCharCode(...data.slice(dataOff, dataOff + comp - 1));
        }
      }
    }
    offset += 2 + length;
  }
  return null;
}

// ─── STATE ──────────────────────────────────────────────────────
let items = [];

// ─── ファイル処理 ──────────────────────────────────────────────
async function handleFiles(files) {
  const fileArr = Array.from(files);
  for (const file of fileArr) {
    const url = URL.createObjectURL(file);
    const gps = await readExifGPS(file);
    const exifDate = await readExifDate(file);
    items.push({ file, url, gps, exifDate, note: '' });
  }
  renderAll();
}

// ─── RENDER ─────────────────────────────────────────────────────
function renderAll() {
  const list = document.getElementById('itemsList');
  const empty = document.getElementById('emptyState');
  const bar = document.getElementById('summaryBar');

  if (items.length === 0) {
    list.innerHTML = '';
    list.appendChild(empty);
    empty.style.display = '';
    bar.style.display = 'none';
    document.getElementById('pdfBtn').disabled = true;
    return;
  }

  empty.style.display = 'none';
  bar.style.display = 'flex';
  document.getElementById('pdfBtn').disabled = false;

  const gpsOk = items.filter(i => i.gps).length;
  document.getElementById('totalCount').textContent = items.length;
  document.getElementById('gpsOkCount').textContent = gpsOk;
  document.getElementById('gpsNgCount').textContent = items.length - gpsOk;

  list.innerHTML = '';
  items.forEach((item, idx) => {
    list.appendChild(createCard(item, idx));
  });
}

function createCard(item, idx) {
  const card = document.createElement('div');
  card.className = 'photo-card';
  card.id = `card-${idx}`;

  const dateStr = item.exifDate
    ? item.exifDate.replace(/^(\d{4}):(\d{2}):(\d{2})/, '$1/$2/$3')
    : '撮影日時不明';

  const gpsHtml = item.gps
    ? `<div>lat: <span>${item.gps.lat}</span></div><div>lng: <span>${item.gps.lng}</span></div>`
    : '<div>GPS情報なし</div>';

  const mapHtml = item.gps
    ? `<iframe
        src="https://www.openstreetmap.org/export/embed.html?bbox=${(parseFloat(item.gps.lng)-0.003)},${(parseFloat(item.gps.lat)-0.003)},${(parseFloat(item.gps.lng)+0.003)},${(parseFloat(item.gps.lat)+0.003)}&layer=mapnik&marker=${item.gps.lat},${item.gps.lng}"
        allowfullscreen loading="lazy"></iframe>`
    : `<div class="no-gps-placeholder"><div class="icon">📵</div><div>GPSデータなし</div></div>`;

  card.innerHTML = `
    <div class="card-header">
      <div class="card-num">#${String(idx + 1).padStart(2, '0')}</div>
      <div class="card-filename">${item.file.name}</div>
      <div class="gps-badge ${item.gps ? 'gps-ok' : 'gps-ng'}">${item.gps ? '📍 GPS' : '⚠ NO GPS'}</div>
      <button class="btn btn-danger" onclick="removeItem(${idx})">✕</button>
    </div>
    <div class="card-body">
      <div class="photo-pane">
        <img class="photo-thumb" src="${item.url}" alt="${item.file.name}">
        <div class="photo-info">
          <div>📅 <span>${dateStr}</span></div>
          ${gpsHtml}
        </div>
      </div>
      <div class="map-pane">
        <div class="map-container">${mapHtml}</div>
      </div>
    </div>
    <div class="card-footer">
      <input class="note-input" type="text" placeholder="現場メモ（被害内容・対応状況など）" value="${item.note}"
        oninput="items[${idx}].note = this.value">
    </div>
  `;
  return card;
}

function removeItem(idx) {
  URL.revokeObjectURL(items[idx].url);
  items.splice(idx, 1);
  renderAll();
}

function clearAll() {
  if (items.length > 0 && !confirm('全件削除しますか？')) return;
  items.forEach(i => URL.revokeObjectURL(i.url));
  items = [];
  renderAll();
  document.getElementById('fileInput').value = '';
}

// ─── DRAG & DROP ──────────────────────────────────────────────
const dropZone = document.getElementById('dropZone');
dropZone.addEventListener('dragover', e => { e.preventDefault(); dropZone.classList.add('drag-over'); });
dropZone.addEventListener('dragleave', () => dropZone.classList.remove('drag-over'));
dropZone.addEventListener('drop', e => {
  e.preventDefault();
  dropZone.classList.remove('drag-over');
  handleFiles(e.dataTransfer.files);
});

// ─── PDF EXPORT ───────────────────────────────────────────────
async function exportPDF() {
  const btn = document.getElementById('pdfBtn');
  const btnText = document.getElementById('pdfBtnText');
  btn.disabled = true;
  btnText.innerHTML = '<span class="spinner"></span> 生成中…';

  try {
    const { jsPDF } = window.jspdf;
    const pdf = new jsPDF({ orientation: 'p', unit: 'mm', format: 'a4' });

    const W = 210, H = 297, margin = 14;
    let y = margin;

    // ヘッダー
    pdf.setFillColor(15, 17, 23);
    pdf.rect(0, 0, W, 22, 'F');
    pdf.setTextColor(255, 255, 255);
    pdf.setFontSize(13);
    pdf.setFont(undefined, 'bold');
    const title = document.getElementById('reportTitle').value || 'GPS写真レポート';
    pdf.text(title, margin, 13);
    pdf.setFontSize(8);
    pdf.setFont(undefined, 'normal');
    pdf.setTextColor(139, 144, 168);
    const author = document.getElementById('reportAuthor').value;
    const date = document.getElementById('reportDate').value;
    pdf.text(`${author}　${date}`, W - margin, 13, { align: 'right' });
    y = 30;

    for (let i = 0; i < items.length; i++) {
      const item = items[i];
      const pageH = 110; // 1件あたりの高さ

      if (y + pageH > H - margin) {
        pdf.addPage();
        y = margin;
      }

      // カード背景
      pdf.setFillColor(26, 29, 39);
      pdf.setDrawColor(46, 52, 80);
      pdf.roundedRect(margin, y, W - margin * 2, pageH, 3, 3, 'FD');

      // 番号バッジ
      pdf.setFillColor(79, 142, 247);
      pdf.roundedRect(margin + 4, y + 4, 18, 7, 1.5, 1.5, 'F');
      pdf.setTextColor(255, 255, 255);
      pdf.setFontSize(7);
      pdf.setFont(undefined, 'bold');
      pdf.text(`#${String(i + 1).padStart(2, '0')}`, margin + 13, y + 9, { align: 'center' });

      // ファイル名
      pdf.setTextColor(232, 234, 240);
      pdf.setFontSize(9);
      pdf.text(item.file.name, margin + 26, y + 9);

      // GPS badge
      if (item.gps) {
        pdf.setFillColor(61, 214, 140, 0.2);
        pdf.setDrawColor(61, 214, 140);
        pdf.roundedRect(W - margin - 26, y + 3, 24, 7, 1.5, 1.5, 'FD');
        pdf.setTextColor(61, 214, 140);
        pdf.setFontSize(7);
        pdf.text('GPS 有', W - margin - 14, y + 8.5, { align: 'center' });
      }

      const bodyY = y + 14;
      const photoW = 55, photoH = 42;

      // 写真
      try {
        const imgData = await toBase64(item.url);
        pdf.addImage(imgData, 'JPEG', margin + 4, bodyY, photoW, photoH, '', 'MEDIUM');
      } catch {}

      // GPS情報
      const infoX = margin + photoW + 10;
      pdf.setTextColor(139, 144, 168);
      pdf.setFontSize(7.5);
      pdf.setFont(undefined, 'normal');
      const dateStr = item.exifDate
        ? item.exifDate.replace(/^(\d{4}):(\d{2}):(\d{2})/, '$1/$2/$3')
        : '撮影日時不明';
      pdf.text(`撮影: ${dateStr}`, infoX, bodyY + 7);
      if (item.gps) {
        pdf.text(`lat: ${item.gps.lat}`, infoX, bodyY + 14);
        pdf.text(`lng: ${item.gps.lng}`, infoX, bodyY + 20);
      }

      // メモ
      if (item.note) {
        pdf.setTextColor(247, 184, 79);
        pdf.setFontSize(8);
        pdf.text(`📝 ${item.note}`, margin + 4, bodyY + photoH + 8);
      }

      // 地図スクリーンショット（iframe→canvas不可のためOSM静的地図API使用）
      if (item.gps) {
        try {
          const mapUrl = `https://staticmap.openstreetmap.de/staticmap.php?center=${item.gps.lat},${item.gps.lng}&zoom=15&size=300x200&markers=${item.gps.lat},${item.gps.lng},red-pushpin`;
          const mapImgEl = document.createElement('img');
          mapImgEl.crossOrigin = 'anonymous';
          await new Promise((res, rej) => {
            mapImgEl.onload = res;
            mapImgEl.onerror = rej;
            mapImgEl.src = mapUrl;
            setTimeout(rej, 5000);
          });
          const mc = document.createElement('canvas');
          mc.width = 300; mc.height = 200;
          mc.getContext('2d').drawImage(mapImgEl, 0, 0);
          const mapData = mc.toDataURL('image/jpeg', 0.85);
          const mapW = 72, mapH = 48;
          pdf.addImage(mapData, 'JPEG', W - margin - mapW - 4, bodyY, mapW, mapH, '', 'MEDIUM');
        } catch {
          // 地図取得失敗時は座標テキストのみ
          pdf.setFillColor(22, 25, 37);
          pdf.rect(W - margin - 76, bodyY, 72, 48, 'F');
          pdf.setTextColor(79, 142, 247);
          pdf.setFontSize(7);
          pdf.text(`📍 ${item.gps.lat}`, W - margin - 76 + 36, bodyY + 20, { align: 'center' });
          pdf.text(`${item.gps.lng}`, W - margin - 76 + 36, bodyY + 27, { align: 'center' });
        }
      }

      y += pageH + 8;
    }

    // フッター
    const pageCount = pdf.internal.getNumberOfPages();
    for (let p = 1; p <= pageCount; p++) {
      pdf.setPage(p);
      pdf.setTextColor(139, 144, 168);
      pdf.setFontSize(7);
      pdf.text(`${p} / ${pageCount}`, W / 2, H - 6, { align: 'center' });
    }

    const filename = `GPS写真レポート_${new Date().toISOString().slice(0,10)}.pdf`;
    pdf.save(filename);
  } finally {
    btn.disabled = false;
    btnText.innerHTML = '📄 PDF出力';
  }
}

function toBase64(url) {
  return new Promise((resolve, reject) => {
    const img = new Image();
    img.crossOrigin = 'anonymous';
    img.onload = () => {
      const c = document.createElement('canvas');
      c.width = img.naturalWidth;
      c.height = img.naturalHeight;
      c.getContext('2d').drawImage(img, 0, 0);
      resolve(c.toDataURL('image/jpeg', 0.85));
    };
    img.onerror = reject;
    img.src = url;
  });
}

// ─── INIT ─────────────────────────────────────────────────────
(function init() {
  const now = new Date();
  const pad = n => String(n).padStart(2, '0');
  document.getElementById('reportDate').value =
    `${now.getFullYear()}年${pad(now.getMonth()+1)}月${pad(now.getDate())}日 ${pad(now.getHours())}:${pad(now.getMinutes())}`;
  renderAll();
})();
</script>
