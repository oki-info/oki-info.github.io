name: 河川カメラ画像取得

on:
  schedule:
    - cron: '0,5,10,15,20,25,30,35,40,45,50,55 * * * *'
  workflow_dispatch:

jobs:
  fetch-images:
    runs-on: ubuntu-latest
    steps:
      - name: リポジトリをチェックアウト
        uses: actions/checkout@v4

      - name: 画像取得
        run: |
          mkdir -p img_cam

          # ── 沖縄県河川カメラ（p-01〜p-99 自動スキャン）──
          BASE="http://bousai-kasen.pref.okinawa.jp/river/kasen/img_cam"
          for N in $(seq 1 99); do
            PID=$(echo $N | awk '{printf "%02d", $1}')
            curl -sf --max-time 10 --retry 1 \
              -H "Referer: http://bousai-kasen.pref.okinawa.jp/" \
              -H "User-Agent: Mozilla/5.0" \
              -o "img_cam/p-${PID}.jpg" \
              "${BASE}/p-${PID}.jpg" && echo "OK: p-${PID}" || rm -f "img_cam/p-${PID}.jpg"
          done

          # ── 沖縄市水位監視カメラ ──
          curl -sf --max-time 15 --retry 2 -H "User-Agent: Mozilla/5.0" \
            -o "img_cam/okinawa-city-hija.jpg" \
            "https://www.city.okinawa.okinawa.jp/suiikanshi/hijacam/hijacam.jpg" \
            && echo "OK: 比謝川" || echo "NG: 比謝川"
          curl -sf --max-time 15 --retry 2 -H "User-Agent: Mozilla/5.0" \
            -o "img_cam/okinawa-city-awase1.jpg" \
            "https://www.city.okinawa.okinawa.jp/suiikanshi/awasecam01/TRIFORA.jpg" \
            && echo "OK: 泡瀬1" || echo "NG: 泡瀬1"
          curl -sf --max-time 15 --retry 2 -H "User-Agent: Mozilla/5.0" \
            -o "img_cam/okinawa-city-awase2.jpg" \
            "https://www.city.okinawa.okinawa.jp/suiikanshi/awasecam02/TRIFORA.jpg" \
            && echo "OK: 泡瀬2" || echo "NG: 泡瀬2"

          # ── 南部国道事務所 道路カメラ ──
          for N in 01 02 03 04 05; do
            curl -sf --max-time 15 --retry 2 \
              -H "Referer: https://www.dc.ogb.go.jp/nankoku/cctv/${N}.html" \
              -H "User-Agent: Mozilla/5.0" \
              -o "img_cam/road-${N}.jpg" \
              "https://www.dc.ogb.go.jp/nankoku/cctv/images/${N}.jpg" \
              && echo "OK: 国道${N}" || echo "NG: 国道${N}"
          done

          # ── 東村 防災監視カメラ ──
          HIGASHI_BASE="http://www2.vill.higashi.okinawa.jp"
          for CAM in \
            "takae-school:高江小学校" \
            "takae-school-seimon:高江小学校正門" \
            "higashi-port:東漁港" \
            "fkc-park:福地川海浜公園" \
            "center-pbh:中央公民館" \
            "hirugi:慶佐次ふれあいヒルギ公園" \
            "arime-school:有銘小学校グラウンド" \
            "higashi-school:東小中学校"; do
            KEY="${CAM%%:*}"
            LABEL="${CAM##*:}"
            curl -sf --max-time 20 --retry 3 --retry-delay 2 \
              --insecure \
              -H "Referer: ${HIGASHI_BASE}/${KEY}.html" \
              -H "User-Agent: Mozilla/5.0" \
              -o "img_cam/higashi-${KEY}.jpg" \
              "${HIGASHI_BASE}/photo/${KEY}.jpg" \
              && echo "OK: 東村 ${LABEL}" || echo "NG: 東村 ${LABEL}"
          done

          # ── 大宜味村 防災ネットワークカメラ ──
          OGIMI_BASE="http://www-camera.vill.ogimi.lg.jp"
          for CAM in \
            "nousonic:農村環境改善センター" \
            "takazatocc:田嘉里公民館" \
            "ogimiej:大宜味小中学校" \
            "tuhacc:津波公民館" \
            "taihocc:大保公民館" \
            "shioya:旧塩屋小学校" \
            "ogimiejgrd:旧大宜味小学校グラウンド"; do
            KEY="${CAM%%:*}"
            LABEL="${CAM##*:}"
            curl -sf --max-time 20 --retry 3 --retry-delay 2 \
              --insecure \
              -H "Referer: ${OGIMI_BASE}/${KEY}.html" \
              -H "User-Agent: Mozilla/5.0" \
              -o "img_cam/ogimi-${KEY}.jpg" \
              "${OGIMI_BASE}/photo/${KEY}.jpg" \
              && echo "OK: 大宜味村 ${LABEL}" || echo "NG: 大宜味村 ${LABEL}"
          done

      - name: キキクル危険度分布取得（タイル色解析）
        run: pip install Pillow --break-system-packages -q
      - name: キキクル危険度分布取得（タイル色解析）
        shell: python3 {0}
        run: |
          import json, math, urllib.request, io
          from datetime import datetime, timezone, timedelta
          from PIL import Image

          JST = timezone(timedelta(hours=9))

          def fetch_tile(url):
              req = urllib.request.Request(url, headers={
                  'User-Agent': 'Mozilla/5.0',
                  'Referer': 'https://www.jma.go.jp/bosai/risk/',
              })
              with urllib.request.urlopen(req, timeout=10) as r:
                  return r.read()

          def rgb_to_hsv(r, g, b):
              r, g, b = r/255, g/255, b/255
              mx, mn = max(r,g,b), min(r,g,b)
              df = mx - mn
              v = mx
              if mx == 0: return 0, 0, 0
              s = df / mx
              if df == 0: return 0, s, v
              if mx == r: h = (60 * ((g-b)/df)) % 360
              elif mx == g: h = 60 * ((b-r)/df) + 120
              else: h = 60 * ((r-g)/df) + 240
              return h, s, v

          def classify_pixel(r, g, b, a):
              """0=平常 1=注意(黄) 2=警戒(赤) 3=危険(紫) 4=災害切迫(黒)"""
              if a < 40: return 0
              h, s, v = rgb_to_hsv(r, g, b)
              if v < 0.25 and s < 0.4: return 4  # 黒=災害切迫
              if 250 <= h <= 320 and s > 0.3 and v > 0.2: return 3  # 紫=危険
              if ((h <= 25 or h >= 335) and s > 0.5 and v > 0.3): return 2  # 赤=警戒
              if 40 <= h <= 85 and s > 0.4 and v > 0.4: return 1  # 黄=注意
              return 0

          def lat_lon_to_tile(lat, lon, zoom):
              x = int((lon + 180) / 360 * (2**zoom))
              lat_r = math.radians(lat)
              y = int((1 - math.log(math.tan(lat_r) + 1/math.cos(lat_r)) / math.pi) / 2 * (2**zoom))
              return x, y

          ZOOM = 7
          # 沖縄全域タイル範囲
          X_MIN, X_MAX = 107, 110
          Y_MIN, Y_MAX = 53, 55

          ELEM_LABELS = {'inund': '浸水', 'land': '土砂', 'flood': '洪水'}
          LEVEL_LABELS = {0: '平常', 1: '注意', 2: '警戒', 3: '危険', 4: '災害切迫'}

          result = {
              'fetched_jst': datetime.now(JST).strftime('%Y-%m-%d %H:%M'),
              'has_alert': False,
              'max_level': 0,
              'max_label': '平常',
              'elements': {},
          }

          try:
              tt = json.loads(fetch_tile('https://www.jma.go.jp/bosai/jmatile/data/risk/targetTimes.json'))
              latest = tt[0]
              bt = latest['basetime']
              vt = latest['validtime']
              mb = latest.get('member', 'none')
              print(f"キキクル時刻: bt={bt} member={mb}")
          except Exception as e:
              print(f"targetTimes NG: {e}")
              bt = vt = mb = None

          if bt:
              for elem, label in ELEM_LABELS.items():
                  elem_max = 0
                  tile_count = 0
                  alert_tiles = 0
                  for tx in range(X_MIN, X_MAX + 1):
                      for ty in range(Y_MIN, Y_MAX + 1):
                          url = f'https://www.jma.go.jp/bosai/jmatile/data/risk/{bt}/{vt}/{mb}/{elem}/surf/{ZOOM}/{tx}/{ty}.png'
                          try:
                              raw = fetch_tile(url)
                              img = Image.open(io.BytesIO(raw)).convert('RGBA')
                              pixels = list(img.getdata())
                              tile_max = 0
                              for px in pixels:
                                  lv = classify_pixel(*px)
                                  if lv > tile_max:
                                      tile_max = lv
                              if tile_max > 0:
                                  alert_tiles += 1
                              elem_max = max(elem_max, tile_max)
                              tile_count += 1
                          except Exception as e:
                              pass  # 海など存在しないタイルは無視
                  result['elements'][elem] = {
                      'label_jp': label,
                      'level': elem_max,
                      'label': LEVEL_LABELS.get(elem_max, '平常'),
                      'has_alert': elem_max > 0,
                  }
                  if elem_max > 0:
                      result['has_alert'] = True
                  result['max_level'] = max(result['max_level'], elem_max)
                  print(f"キキクル{label}({elem}): 最大レベル={elem_max}({LEVEL_LABELS.get(elem_max,'平常')}) タイル={tile_count}枚 警戒以上={alert_tiles}枚")

          result['max_label'] = LEVEL_LABELS.get(result['max_level'], '平常')
          with open('kikukuru.json', 'w', encoding='utf-8') as f:
              json.dump(result, f, ensure_ascii=False, indent=2)
          print(f"kikukuru.json 生成完了: has_alert={result['has_alert']} max={result['max_label']}")

      - name: 早期注意情報取得（warning.jsonに追記）
        shell: python3 {0}
        run: |
          import json, urllib.request, gzip
          from datetime import datetime, timezone, timedelta
          JST = timezone(timedelta(hours=9))

          def fetch(url):
              req = urllib.request.Request(url, headers={
                  'User-Agent': 'Mozilla/5.0',
                  'Referer': 'https://www.jma.go.jp/bosai/warning/',
              })
              with urllib.request.urlopen(req, timeout=15) as r:
                  raw = r.read()
              if raw[:2] == b'\x1f\x8b':
                  import gzip as gz; raw = gz.decompress(raw)
              return raw.decode('utf-8', errors='replace')

          # 既存のwarning.jsonを読み込む
          try:
              with open('warning.json', encoding='utf-8') as f:
                  w = json.load(f)
          except:
              w = {'fetched_jst': datetime.now(JST).strftime('%Y-%m-%d %H:%M'),
                   'warnings': [], 'typhoons': []}

          # 早期注意情報（警報級の可能性）
          # https://www.jma.go.jp/bosai/warning/data/early_warning/471000.json
          try:
              # 早期注意情報は forecast/471000.json の timeSeries に含まれる
              # または probability ページから取得
              for try_url in [
                  'https://www.jma.go.jp/bosai/probability/data/probability/471000.json',
                  'https://www.jma.go.jp/bosai/forecast/data/forecast/471000.json',
                  'https://www.jma.go.jp/bosai/warning/data/early_warning/471000.json',
              ]:
                  try:
                      raw_b = fetch(try_url)
                      raw = json.loads(raw_b)
                      print(f"早期注意情報URL成功: {try_url.split('bosai/')[1][:50]}")
                      print(f"  型: {type(raw)}, キー: {list(raw.keys())[:6] if isinstance(raw,dict) else 'list len='+str(len(raw))}")
                      if isinstance(raw, list) and raw:
                          print(f"  [0]キー: {list(raw[0].keys())[:6]}")
                      break
                  except Exception as eu:
                      print(f"URL失敗: {try_url.split('bosai/')[1][:50]} → {eu}")
                      raw = None
              print(f"早期注意情報URL成功: {try_url.split('bosai/')[1][:50]}")
              early = []
              # probability/471000.json は timeSeries 構造
              # [{reportDatetime, timeSeries:[{timeDefines:[...], areas:[{area:{name}, properties:[{type, conditions:[...]}]}]}]}]
              for entry in (raw if isinstance(raw, list) else [raw]):
                  for ts in (entry.get('timeSeries') or []):
                      time_defines = ts.get('timeDefines') or []
                      for area in (ts.get('areas') or []):
                          area_name = (area.get('area') or {}).get('name','')
                          if not area_name: continue
                          props = area.get('properties') or []
                          active_items = []
                          for prop in props:
                              ptype = prop.get('type','')
                              conditions = prop.get('conditions') or []
                              for i, cond in enumerate(conditions):
                                  if cond and cond not in ('なし','','－'):
                                      td = time_defines[i][:10] if i < len(time_defines) else ''
                                      active_items.append({'type': ptype, 'time': td, 'condition': cond})
                          if active_items:
                              existing = next((e for e in early if e['area']==area_name), None)
                              if existing:
                                  existing['items'].extend(active_items)
                              else:
                                  early.append({'area': area_name, 'items': active_items})

              # デバッグ: 構造確認
              if not early and isinstance(raw, list) and raw:
                  ts0 = (raw[0].get('timeSeries') or [{}])[0]
                  areas0 = (ts0.get('areas') or [{}])[:1]
                  if areas0:
                      print(f"  areas[0]キー: {list(areas0[0].keys())}")
                      print(f"  areas[0]: {str(areas0[0])[:300]}")

              w['early_warning'] = early
              print(f"早期注意情報: {len(early)}エリア (発表中: {sum(1 for e in early if e['items'])}エリア)")
          except Exception as e:
              w['early_warning'] = []
              print(f"早期注意情報NG: {type(e).__name__}: {e}")

          with open('warning.json', 'w', encoding='utf-8') as f:
              json.dump(w, f, ensure_ascii=False, indent=2)
          print("warning.json更新完了")

      - name: earthquake.json 生成（沖縄周辺 直近24時間）
        shell: python3 {0}
        run: |
          import json, urllib.request, gzip
          from datetime import datetime, timezone, timedelta

          JST = timezone(timedelta(hours=9))
          UTC = timezone.utc
          now_utc = datetime.now(UTC)

          def fetch(url):
              req = urllib.request.Request(url, headers={
                  'User-Agent': 'Mozilla/5.0',
                  'Accept-Encoding': 'gzip, deflate',
              })
              with urllib.request.urlopen(req, timeout=15) as r:
                  raw = r.read()
              if raw[:2] == b'\x1f\x8b':
                  raw = gzip.decompress(raw)
              return raw

          # 沖縄・周辺に関連するキーワード
          OKINAWA_KEYWORDS = [
              '沖縄', '琉球', '宮古', '八重山', '石垣', '先島', '西表',
              '与那国', '奄美', '南西諸島', 'トカラ', '口永良部',
          ]

          result = {
              'fetched_jst': datetime.now(JST).strftime('%Y-%m-%d %H:%M'),
              'earthquakes': [],
          }

          try:
              list_data = json.loads(fetch('https://www.jma.go.jp/bosai/quake/data/list.json'))
              print(f"地震リスト総件数: {len(list_data)}")
              if list_data:
                  print(f"サンプルキー: {list(list_data[0].keys())}")
                  print(f"サンプル: {list_data[0]}")

              cutoff = now_utc - timedelta(hours=24)
              count = 0
              for q in list_data:
                  # 時刻: 'at' or 'rdt' フィールド (例: "2026-03-12T13:40:00+00:00")
                  at_str = q.get('at') or q.get('rdt') or ''
                  try:
                      at_dt = datetime.fromisoformat(at_str.replace('Z', '+00:00'))
                      if at_dt.tzinfo is None:
                          at_dt = at_dt.replace(tzinfo=UTC)
                  except:
                      continue
                  if at_dt < cutoff:
                      continue

                  # 震源地: 'anm' フィールド
                  loc = q.get('anm') or q.get('en_anm') or ''
                  # 沖縄関連かチェック
                  if not any(k in loc for k in OKINAWA_KEYWORDS):
                      continue

                  mag   = q.get('mag', '-')
                  maxi  = q.get('maxi') or q.get('mxint') or '-'
                  depth = q.get('dep') or q.get('depth') or '-'
                  at_jst = at_dt.astimezone(JST).strftime('%m/%d %H:%M')

                  result['earthquakes'].append({
                      'time':  at_jst,
                      'loc':   loc,
                      'mag':   mag,
                      'depth': depth,
                      'maxi':  maxi,
                  })
                  count += 1

              print(f"沖縄周辺地震（24時間）: {count}件")
              if count == 0 and list_data:
                  # デバッグ: 最新5件の震源地を出力
                  for q in list_data[:5]:
                      print(f"  anm={q.get('anm','?')} at={q.get('at','?')} mag={q.get('mag','?')}")

          except Exception as e:
              import traceback; traceback.print_exc()
              print(f"地震情報 NG: {e}")

          with open('earthquake.json', 'w', encoding='utf-8') as f:
              json.dump(result, f, ensure_ascii=False, indent=2)
          print(f"earthquake.json 生成完了: {len(result['earthquakes'])}件")

      - name: 河川水位データ生成（沖縄県河川情報システム）
        run: |
          echo '' | base64 -d > /tmp/river.py
          python3 /tmp/river.py

      - name: amedas.json 生成（沖縄主要観測点）
        run: |
          echo '' | base64 -d > /tmp/amedas.py
          python3 /tmp/amedas.py

      - name: flight.json 生成（那覇空港周辺フライト・離島船舶）
        run: |
          echo '' | base64 -d > /tmp/flight.py
          python3 /tmp/flight.py

      - name: コミット・プッシュ
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add img_cam/ cameras.json warning.json kikukuru.json earthquake.json river.json amedas.json flight.json
          git diff --staged --quiet || (git commit -m "🌊 カメラ更新 $(TZ='Asia/Tokyo' date '+%Y-%m-%d %H:%M') JST" && git pull --rebase && git push)
