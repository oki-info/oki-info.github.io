name: 河川カメラ画像取得

on:
  schedule:
    - cron: '0,5,10,15,20,25,30,35,40,45,50,55 * * * *'
  workflow_dispatch:

jobs:
  fetch-images:
    runs-on: ubuntu-latest
    steps:
      - name: リポジトリをチェックアウト
        uses: actions/checkout@v4

      - name: 画像取得
        run: |
          mkdir -p img_cam

          # ── 沖縄県河川カメラ（p-01〜p-99 自動スキャン）──
          BASE="http://bousai-kasen.pref.okinawa.jp/river/kasen/img_cam"
          for N in $(seq 1 99); do
            PID=$(echo $N | awk '{printf "%02d", $1}')
            curl -sf --max-time 10 --retry 1 \
              -H "Referer: http://bousai-kasen.pref.okinawa.jp/" \
              -H "User-Agent: Mozilla/5.0" \
              -o "img_cam/p-${PID}.jpg" \
              "${BASE}/p-${PID}.jpg" && echo "OK: p-${PID}" || rm -f "img_cam/p-${PID}.jpg"
          done

          # ── 沖縄市水位監視カメラ ──
          curl -sf --max-time 15 --retry 2 -H "User-Agent: Mozilla/5.0" \
            -o "img_cam/okinawa-city-hija.jpg" \
            "https://www.city.okinawa.okinawa.jp/suiikanshi/hijacam/hijacam.jpg" \
            && echo "OK: 比謝川" || echo "NG: 比謝川"
          curl -sf --max-time 15 --retry 2 -H "User-Agent: Mozilla/5.0" \
            -o "img_cam/okinawa-city-awase1.jpg" \
            "https://www.city.okinawa.okinawa.jp/suiikanshi/awasecam01/TRIFORA.jpg" \
            && echo "OK: 泡瀬1" || echo "NG: 泡瀬1"
          curl -sf --max-time 15 --retry 2 -H "User-Agent: Mozilla/5.0" \
            -o "img_cam/okinawa-city-awase2.jpg" \
            "https://www.city.okinawa.okinawa.jp/suiikanshi/awasecam02/TRIFORA.jpg" \
            && echo "OK: 泡瀬2" || echo "NG: 泡瀬2"

          # ── 南部国道事務所 道路カメラ ──
          for N in 01 02 03 04 05; do
            curl -sf --max-time 15 --retry 2 \
              -H "Referer: https://www.dc.ogb.go.jp/nankoku/cctv/${N}.html" \
              -H "User-Agent: Mozilla/5.0" \
              -o "img_cam/road-${N}.jpg" \
              "https://www.dc.ogb.go.jp/nankoku/cctv/images/${N}.jpg" \
              && echo "OK: 国道${N}" || echo "NG: 国道${N}"
          done

          # ── 東村 防災監視カメラ ──
          HIGASHI_BASE="http://www2.vill.higashi.okinawa.jp"
          for CAM in \
            "takae-school:高江小学校" \
            "takae-school-seimon:高江小学校正門" \
            "higashi-port:東漁港" \
            "fkc-park:福地川海浜公園" \
            "center-pbh:中央公民館" \
            "hirugi:慶佐次ふれあいヒルギ公園" \
            "arime-school:有銘小学校グラウンド" \
            "higashi-school:東小中学校"; do
            KEY="${CAM%%:*}"
            LABEL="${CAM##*:}"
            curl -sf --max-time 20 --retry 3 --retry-delay 2 \
              --insecure \
              -H "Referer: ${HIGASHI_BASE}/${KEY}.html" \
              -H "User-Agent: Mozilla/5.0" \
              -o "img_cam/higashi-${KEY}.jpg" \
              "${HIGASHI_BASE}/photo/${KEY}.jpg" \
              && echo "OK: 東村 ${LABEL}" || echo "NG: 東村 ${LABEL}"
          done

          # ── 大宜味村 防災ネットワークカメラ ──
          OGIMI_BASE="http://www-camera.vill.ogimi.lg.jp"
          for CAM in \
            "nousonic:農村環境改善センター" \
            "takazatocc:田嘉里公民館" \
            "ogimiej:大宜味小中学校" \
            "tuhacc:津波公民館" \
            "taihocc:大保公民館" \
            "shioya:旧塩屋小学校" \
            "ogimiejgrd:旧大宜味小学校グラウンド"; do
            KEY="${CAM%%:*}"
            LABEL="${CAM##*:}"
            curl -sf --max-time 20 --retry 3 --retry-delay 2 \
              --insecure \
              -H "Referer: ${OGIMI_BASE}/${KEY}.html" \
              -H "User-Agent: Mozilla/5.0" \
              -o "img_cam/ogimi-${KEY}.jpg" \
              "${OGIMI_BASE}/photo/${KEY}.jpg" \
              && echo "OK: 大宜味村 ${LABEL}" || echo "NG: 大宜味村 ${LABEL}"
          done

      - name: キキクル危険度分布取得（タイル色解析）
        run: pip install Pillow --break-system-packages -q
      - name: キキクル危険度分布取得（タイル色解析）
        shell: python3 {0}
        run: |
          import json, math, urllib.request, io
          from datetime import datetime, timezone, timedelta
          from PIL import Image

          JST = timezone(timedelta(hours=9))

          def fetch_tile(url):
              req = urllib.request.Request(url, headers={
                  'User-Agent': 'Mozilla/5.0',
                  'Referer': 'https://www.jma.go.jp/bosai/risk/',
              })
              with urllib.request.urlopen(req, timeout=10) as r:
                  return r.read()

          def rgb_to_hsv(r, g, b):
              r, g, b = r/255, g/255, b/255
              mx, mn = max(r,g,b), min(r,g,b)
              df = mx - mn
              v = mx
              if mx == 0: return 0, 0, 0
              s = df / mx
              if df == 0: return 0, s, v
              if mx == r: h = (60 * ((g-b)/df)) % 360
              elif mx == g: h = 60 * ((b-r)/df) + 120
              else: h = 60 * ((r-g)/df) + 240
              return h, s, v

          def classify_pixel(r, g, b, a):
              """0=平常 1=注意(黄) 2=警戒(赤) 3=危険(紫) 4=災害切迫(黒)"""
              if a < 40: return 0
              h, s, v = rgb_to_hsv(r, g, b)
              if v < 0.25 and s < 0.4: return 4  # 黒=災害切迫
              if 250 <= h <= 320 and s > 0.3 and v > 0.2: return 3  # 紫=危険
              if ((h <= 25 or h >= 335) and s > 0.5 and v > 0.3): return 2  # 赤=警戒
              if 40 <= h <= 85 and s > 0.4 and v > 0.4: return 1  # 黄=注意
              return 0

          def lat_lon_to_tile(lat, lon, zoom):
              x = int((lon + 180) / 360 * (2**zoom))
              lat_r = math.radians(lat)
              y = int((1 - math.log(math.tan(lat_r) + 1/math.cos(lat_r)) / math.pi) / 2 * (2**zoom))
              return x, y

          ZOOM = 7
          # 沖縄全域タイル範囲
          X_MIN, X_MAX = 107, 110
          Y_MIN, Y_MAX = 53, 55

          ELEM_LABELS = {'inund': '浸水', 'land': '土砂', 'flood': '洪水'}
          LEVEL_LABELS = {0: '平常', 1: '注意', 2: '警戒', 3: '危険', 4: '災害切迫'}

          result = {
              'fetched_jst': datetime.now(JST).strftime('%Y-%m-%d %H:%M'),
              'has_alert': False,
              'max_level': 0,
              'max_label': '平常',
              'elements': {},
          }

          try:
              tt = json.loads(fetch_tile('https://www.jma.go.jp/bosai/jmatile/data/risk/targetTimes.json'))
              latest = tt[0]
              bt = latest['basetime']
              vt = latest['validtime']
              mb = latest.get('member', 'none')
              print(f"キキクル時刻: bt={bt} member={mb}")
          except Exception as e:
              print(f"targetTimes NG: {e}")
              bt = vt = mb = None

          if bt:
              for elem, label in ELEM_LABELS.items():
                  elem_max = 0
                  tile_count = 0
                  alert_tiles = 0
                  for tx in range(X_MIN, X_MAX + 1):
                      for ty in range(Y_MIN, Y_MAX + 1):
                          url = f'https://www.jma.go.jp/bosai/jmatile/data/risk/{bt}/{vt}/{mb}/{elem}/surf/{ZOOM}/{tx}/{ty}.png'
                          try:
                              raw = fetch_tile(url)
                              img = Image.open(io.BytesIO(raw)).convert('RGBA')
                              pixels = list(img.getdata())
                              tile_max = 0
                              for px in pixels:
                                  lv = classify_pixel(*px)
                                  if lv > tile_max:
                                      tile_max = lv
                              if tile_max > 0:
                                  alert_tiles += 1
                              elem_max = max(elem_max, tile_max)
                              tile_count += 1
                          except Exception as e:
                              pass  # 海など存在しないタイルは無視
                  result['elements'][elem] = {
                      'label_jp': label,
                      'level': elem_max,
                      'label': LEVEL_LABELS.get(elem_max, '平常'),
                      'has_alert': elem_max > 0,
                  }
                  if elem_max > 0:
                      result['has_alert'] = True
                  result['max_level'] = max(result['max_level'], elem_max)
                  print(f"キキクル{label}({elem}): 最大レベル={elem_max}({LEVEL_LABELS.get(elem_max,'平常')}) タイル={tile_count}枚 警戒以上={alert_tiles}枚")

          result['max_label'] = LEVEL_LABELS.get(result['max_level'], '平常')
          with open('kikukuru.json', 'w', encoding='utf-8') as f:
              json.dump(result, f, ensure_ascii=False, indent=2)
          print(f"kikukuru.json 生成完了: has_alert={result['has_alert']} max={result['max_label']}")

      - name: earthquake.json 生成（沖縄周辺 直近24時間）
        shell: python3 {0}
        run: |
          import json, urllib.request, gzip
          from datetime import datetime, timezone, timedelta

          JST = timezone(timedelta(hours=9))
          UTC = timezone.utc
          now_utc = datetime.now(UTC)

          def fetch(url):
              req = urllib.request.Request(url, headers={
                  'User-Agent': 'Mozilla/5.0',
                  'Accept-Encoding': 'gzip, deflate',
              })
              with urllib.request.urlopen(req, timeout=15) as r:
                  raw = r.read()
              if raw[:2] == b'\x1f\x8b':
                  raw = gzip.decompress(raw)
              return raw

          # 沖縄・周辺に関連するキーワード
          OKINAWA_KEYWORDS = [
              '沖縄', '琉球', '宮古', '八重山', '石垣', '先島', '西表',
              '与那国', '奄美', '南西諸島', 'トカラ', '口永良部',
          ]

          result = {
              'fetched_jst': datetime.now(JST).strftime('%Y-%m-%d %H:%M'),
              'earthquakes': [],
          }

          try:
              list_data = json.loads(fetch('https://www.jma.go.jp/bosai/quake/data/list.json'))
              print(f"地震リスト総件数: {len(list_data)}")
              if list_data:
                  print(f"サンプルキー: {list(list_data[0].keys())}")
                  print(f"サンプル: {list_data[0]}")

              cutoff = now_utc - timedelta(hours=24)
              count = 0
              for q in list_data:
                  # 時刻: 'at' or 'rdt' フィールド (例: "2026-03-12T13:40:00+00:00")
                  at_str = q.get('at') or q.get('rdt') or ''
                  try:
                      at_dt = datetime.fromisoformat(at_str.replace('Z', '+00:00'))
                      if at_dt.tzinfo is None:
                          at_dt = at_dt.replace(tzinfo=UTC)
                  except:
                      continue
                  if at_dt < cutoff:
                      continue

                  # 震源地: 'anm' フィールド
                  loc = q.get('anm') or q.get('en_anm') or ''
                  # 沖縄関連かチェック
                  if not any(k in loc for k in OKINAWA_KEYWORDS):
                      continue

                  mag   = q.get('mag', '-')
                  maxi  = q.get('maxi') or q.get('mxint') or '-'
                  depth = q.get('dep') or q.get('depth') or '-'
                  at_jst = at_dt.astimezone(JST).strftime('%m/%d %H:%M')

                  result['earthquakes'].append({
                      'time':  at_jst,
                      'loc':   loc,
                      'mag':   mag,
                      'depth': depth,
                      'maxi':  maxi,
                  })
                  count += 1

              print(f"沖縄周辺地震（24時間）: {count}件")
              if count == 0 and list_data:
                  # デバッグ: 最新5件の震源地を出力
                  for q in list_data[:5]:
                      print(f"  anm={q.get('anm','?')} at={q.get('at','?')} mag={q.get('mag','?')}")

          except Exception as e:
              import traceback; traceback.print_exc()
              print(f"地震情報 NG: {e}")

          with open('earthquake.json', 'w', encoding='utf-8') as f:
              json.dump(result, f, ensure_ascii=False, indent=2)
          print(f"earthquake.json 生成完了: {len(result['earthquakes'])}件")

      - name: 河川水位データ生成（沖縄県河川情報システム）
        run: |
          echo '' | base64 -d > /tmp/river.py
          python3 /tmp/river.py

      - name: YouTube ライブID取得 + cameras.json + warning.json 生成
        env:
          YOUTUBE_API_KEY: ${{ secrets.YOUTUBE_API_KEY }}
        shell: python3 {0}
        run: |
          import json, os, glob, urllib.request, urllib.parse
          from datetime import datetime, timezone, timedelta

          JST = timezone(timedelta(hours=9))
          now = datetime.now(JST)
          API_KEY = os.environ.get('YOUTUBE_API_KEY', '')

          def yt_api(endpoint, params):
              params['key'] = API_KEY
              url = "https://www.googleapis.com/youtube/v3/" + endpoint + "?" + urllib.parse.urlencode(params)
              try:
                  with urllib.request.urlopen(url, timeout=10) as r:
                      return json.loads(r.read())
              except Exception as e:
                  print(f"API error ({endpoint}): {e}")
                  return {}

          def get_channel_id(handle):
              handle = handle.lstrip('@')
              data = yt_api('channels', {'part': 'id', 'forHandle': handle})
              items = data.get('items', [])
              return items[0]['id'] if items else None

          def get_live_video_id(channel_id, title_keywords=None):
              data = yt_api('search', {
                  'part': 'id,snippet',
                  'channelId': channel_id,
                  'eventType': 'live',
                  'type': 'video',
                  'maxResults': 10
              })
              items = data.get('items', [])
              if not items:
                  return None
              if title_keywords:
                  for item in items:
                      title = item.get('snippet', {}).get('title', '')
                      if any(kw in title for kw in title_keywords):
                          return item['id']['videoId']
                  return None  # キーワード一致なし
              return items[0]['id']['videoId']

          # チャンネルのみのカメラ（動画IDが定期的に変わるもの）
          CHANNEL_CAMERAS = [
              {'name': '那覇市古島',                    'loc': '那覇市古島',   'channel_id': 'UCsmhYj8SkM1cCcXekuaViAg'},
              {'name': '石垣島730交差点',               'loc': '石垣市美崎町', 'handle': '-ishigakiisland-2224'},
              {'name': '恩納村マリブビーチ',             'loc': '国頭郡恩納村', 'handle': 'now2352'},
              {'name': 'かりゆしビーチリゾート',         'loc': '国頭郡恩納村', 'handle': 'Kariyushi.Hotels'},
              {'name': '石垣島ユーグレナ離島ターミナル', 'loc': '石垣市美崎町', 'handle': '離島ターミナル側LIVEカメラ'},
              {'name': '北谷町砂辺',                    'loc': '中頭郡北谷町', 'handle': 'オーシャンビュー北谷町砂辺宮'},
              {'name': '豊見城市宜保',                  'loc': '豊見城市宜保', 'handle': '豊見城市宜保ライブ'},
              {'name': '比地川（国頭村）',               'loc': '国頭郡国頭村', 'handle': 'jotsu_vision'},
              {'name': '浦添市城間ライブ',               'loc': '浦添市城間',   'handle': '浦添市城間ライブ'},
              {'name': '島尻郡南風原町ライブ',           'loc': '島尻郡南風原町', 'handle': '島尻郡南風原町ライブ'},
              {'name': '沖縄県島尻郡ライブ',             'loc': '島尻郡南風原町', 'handle': '沖縄県島尻郡ライブ'},
              {'name': '与那原ライブ',                   'loc': '島尻郡与那原町', 'handle': '与那原ライブ'},
              {'name': 'うるま市州崎ライブカメラ',         'loc': 'うるま市洲崎',   'handle': 'うるま市州崎ライブカメラ'},
              {'name': '那覇空港（日テレNews）',          'loc': '那覇市鏡水',     'handle': 'ntv_news',
               'title_keywords': ['那覇', '沖縄', '空港', 'なは', 'Naha']},
          ]

          youtube_live = []
          if API_KEY:
              for cam in CHANNEL_CAMERAS:
                  channel_id = cam.get('channel_id')
                  if not channel_id:
                      channel_id = get_channel_id(cam['handle'])
                  if channel_id:
                      video_id = get_live_video_id(channel_id, cam.get('title_keywords'))
                      youtube_live.append({
                          'name': cam['name'],
                          'loc': cam['loc'],
                          'channel_id': channel_id,
                          'video_id': video_id
                      })
                      print(f"{cam['name']}: {'OK ' + video_id if video_id else '配信なし'}")
                  else:
                      youtube_live.append({'name': cam['name'], 'loc': cam['loc'], 'channel_id': None, 'video_id': None})
                      print(f"{cam['name']}: チャンネルID取得失敗")

          # 沖縄県河川カメラ
          cameras = []
          for f in sorted(glob.glob('img_cam/p-*.jpg')):
              pid = os.path.basename(f).replace('p-','').replace('.jpg','')
              if os.path.getsize(f) > 100:
                  cameras.append({'pid': pid, 'size': os.path.getsize(f)})

          # 沖縄市カメラ
          extra_cameras = []
          for cam in [
              {'key': 'okinawa-city-hija',  'name': '比謝川',  'loc': '沖縄市（水位監視）'},
              {'key': 'okinawa-city-awase1', 'name': '泡瀬川①', 'loc': '沖縄市（水位監視）'},
              {'key': 'okinawa-city-awase2', 'name': '泡瀬川②', 'loc': '沖縄市（水位監視）'},
          ]:
              f = f"img_cam/{cam['key']}.jpg"
              if os.path.exists(f) and os.path.getsize(f) > 100:
                  extra_cameras.append({**cam, 'size': os.path.getsize(f)})

          # 国道カメラ
          road_cameras = []
          for cam in [
              {'key': 'road-01', 'name': '①国道58号 読谷村比謝',    'loc': '中頭郡読谷村'},
              {'key': 'road-02', 'name': '②国道329号 中城村久場',   'loc': '中頭郡中城村'},
              {'key': 'road-03', 'name': '③国道329号 西原町小那覇', 'loc': '中頭郡西原町'},
              {'key': 'road-04', 'name': '④国道331号 糸満市摩文仁', 'loc': '糸満市摩文仁'},
              {'key': 'road-05', 'name': '⑤国道332号 那覇市安次嶺', 'loc': '那覇市安次嶺'},
          ]:
              f = f"img_cam/{cam['key']}.jpg"
              if os.path.exists(f) and os.path.getsize(f) > 100:
                  road_cameras.append({**cam, 'size': os.path.getsize(f)})

          # 東村カメラ
          higashi_cameras = []
          for cam in [
              {'key': 'higashi-takae-school',        'name': '高江小学校',           'loc': '東村'},
              {'key': 'higashi-takae-school-seimon', 'name': '高江小学校正門',       'loc': '東村'},
              {'key': 'higashi-higashi-port',        'name': '東漁港',               'loc': '東村'},
              {'key': 'higashi-fkc-park',            'name': '福地川海浜公園',       'loc': '東村'},
              {'key': 'higashi-center-pbh',          'name': '中央公民館',           'loc': '東村'},
              {'key': 'higashi-hirugi',              'name': '慶佐次ふれあいヒルギ公園', 'loc': '東村'},
              {'key': 'higashi-arime-school',        'name': '有銘小学校グラウンド', 'loc': '東村'},
              {'key': 'higashi-higashi-school',      'name': '東小中学校',           'loc': '東村'},
          ]:
              f = f"img_cam/{cam['key']}.jpg"
              if os.path.exists(f) and os.path.getsize(f) > 100:
                  higashi_cameras.append({**cam, 'size': os.path.getsize(f)})

          # 大宜味村カメラ
          ogimi_cameras = []
          for cam in [
              {'key': 'ogimi-nousonic',    'name': '農村環境改善センター',     'loc': '大宜味村'},
              {'key': 'ogimi-takazatocc',  'name': '田嘉里公民館',             'loc': '大宜味村'},
              {'key': 'ogimi-ogimiej',     'name': '大宜味小中学校',           'loc': '大宜味村'},
              {'key': 'ogimi-tuhacc',      'name': '津波公民館',               'loc': '大宜味村'},
              {'key': 'ogimi-taihocc',     'name': '大保公民館',               'loc': '大宜味村'},
              {'key': 'ogimi-shioya',      'name': '旧塩屋小学校',             'loc': '大宜味村'},
              {'key': 'ogimi-ogimiejgrd',  'name': '旧大宜味小学校グラウンド', 'loc': '大宜味村'},
          ]:
              f = f"img_cam/{cam['key']}.jpg"
              if os.path.exists(f) and os.path.getsize(f) > 100:
                  ogimi_cameras.append({**cam, 'size': os.path.getsize(f)})

          result = {
              'last_fetch_jst': now.strftime('%Y-%m-%d %H:%M:%S'),
              'camera_count': len(cameras),
              'cameras': cameras,
              'extra_cameras': extra_cameras,
              'road_cameras': road_cameras,
              'higashi_cameras': higashi_cameras,
              'ogimi_cameras': ogimi_cameras,
              'youtube_live': youtube_live
          }
          with open('cameras.json', 'w', encoding='utf-8') as f:
              json.dump(result, f, ensure_ascii=False, indent=2)

          print(f"河川: {len(cameras)}台 / 沖縄市: {len(extra_cameras)}台 / 国道: {len(road_cameras)}台 / 東村: {len(higashi_cameras)}台 / 大宜味村: {len(ogimi_cameras)}台 / YouTube動的: {len(youtube_live)}件")

          # 気象警報・台風情報の取得
          import urllib.request
          warning_result = {'fetched_jst': now.strftime('%Y-%m-%d %H:%M:%S'), 'warnings': [], 'typhoons': []}
          try:
              req = urllib.request.Request(
                  'https://www.jma.go.jp/bosai/warning/data/warning/471000.json',
                  headers={'User-Agent': 'Mozilla/5.0'}
              )
              with urllib.request.urlopen(req, timeout=15) as r:
                  jma = json.loads(r.read().decode())
              areas = []
              for at in (jma.get('areaTypes') or []):
                  cands = [a for a in (at.get('areas') or []) if any(w.get('status')=='発表' for w in (a.get('warnings') or []))]
                  if cands:
                      areas = cands
                      break
              if not areas:
                  for at in (jma.get('areaTypes') or []):
                      areas.extend(at.get('areas') or [])
              warning_result['warnings'] = [
                  {'area_name': a.get('name',''), 'warnings': a.get('warnings',[])}
                  for a in areas
              ]
              print(f"警報取得: {len(warning_result['warnings'])}地域")
          except Exception as e:
              print(f"警報取得失敗: {e}")

          try:
              req2 = urllib.request.Request(
                  'https://www.jma.go.jp/bosai/typhoon/data/alltyphoon.json',
                  headers={'User-Agent': 'Mozilla/5.0'}
              )
              with urllib.request.urlopen(req2, timeout=15) as r:
                  typhoons_raw = json.loads(r.read().decode())
              warning_result['typhoons'] = [t for t in (typhoons_raw or []) if t.get('active')]
              print(f"台風取得: {len(warning_result['typhoons'])}件")
          except Exception as e:
              print(f"台風取得失敗: {e}")


          # ── 津波情報 ──────────────────────────────────────────
          try:
              tsunami_list = json.loads(fetch('https://www.jma.go.jp/bosai/tsunami/data/list.json'))
              # 直近の津波情報を取得（activeなもの）
              active_tsunamis = []
              for t in (tsunami_list if isinstance(tsunami_list, list) else [])[:5]:
                  report_id = t.get('json') or t.get('report_id') or ''
                  if not report_id:
                      continue
                  try:
                      detail = json.loads(fetch(f'https://www.jma.go.jp/bosai/tsunami/data/{report_id}'))
                      # 沖縄関連エリアを抽出
                      areas = detail.get('areas') or detail.get('regions') or []
                      okinawa_areas = []
                      for area in areas:
                          name = area.get('name') or area.get('region') or ''
                          grade = area.get('grade') or area.get('category') or ''
                          if any(k in name for k in ['沖縄','琉球','宮古','八重山','先島']):
                              okinawa_areas.append({'name': name, 'grade': grade})
                      if okinawa_areas:
                          active_tsunamis.append({
                              'time': t.get('at') or t.get('report_datetime') or '',
                              'areas': okinawa_areas,
                              'max_grade': max((a['grade'] for a in okinawa_areas), default=''),
                          })
                  except Exception as te:
                      print(f"津波詳細取得NG: {te}")
                  if active_tsunamis:
                      break  # 最新1件で十分
              warning_result['tsunami'] = active_tsunamis
              print(f"津波情報: {len(active_tsunamis)}件 (沖縄関連)")
              if active_tsunamis:
                  print(f"  最新: {active_tsunamis[0]}")
              else:
                  # list構造をデバッグ出力
                  if tsunami_list:
                      print(f"  津波リストサンプル: {str(tsunami_list[0])[:200]}")
          except Exception as e:
              warning_result['tsunami'] = []
              print(f"津波情報NG: {type(e).__name__}: {e}")

          # ── 南海トラフ地震関連情報 ──────────────────────────────
          try:
              # JMA 南海トラフ地震関連情報
              nankai_url = 'https://www.jma.go.jp/bosai/earthquake_map/data/list.json'
              nankai_list = json.loads(fetch(nankai_url))
              nankai_active = []
              for item in (nankai_list if isinstance(nankai_list, list) else [])[:10]:
                  title = item.get('title') or item.get('ttl') or ''
                  if '南海トラフ' in title:
                      nankai_active.append({
                          'title': title,
                          'time':  item.get('at') or item.get('report_datetime') or '',
                      })
              warning_result['nankai'] = nankai_active
              print(f"南海トラフ情報: {len(nankai_active)}件")
              if not nankai_active and nankai_list:
                  print(f"  リストサンプル: {str(nankai_list[0])[:200]}")
          except Exception as e:
              warning_result['nankai'] = []
              print(f"南海トラフNG: {type(e).__name__}: {e}")

          # ── 停電情報（沖縄電力）デバッグ ──────────────────────
          try:
              for teiden_url in [
                  'https://www.okiden.co.jp/emergency/index.html',
                  'https://www.okiden.co.jp/service/teiden/',
                  'https://www.okiden.co.jp/teiden/',
              ]:
                  try:
                      raw = fetch(teiden_url)
                      print(f"停電URL成功: {teiden_url}")
                      # 停電関連キーワードを検索
                      for kw in ['停電', '件', '戸', '市', '町', '村']:
                          idxkw = raw.find(kw)
                          if idxkw > 0:
                              print(f"  キーワード'{kw}'位置{idxkw}: ...{raw[max(0,idxkw-30):idxkw+60]}...")
                              break
                      print(f"  先頭300chars: {raw[:300]}")
                      break
                  except Exception as eu:
                      print(f"停電URL失敗: {teiden_url} → {eu}")
              warning_result['outage'] = []
          except Exception as e:
              warning_result['outage'] = []
              print(f"停電情報NG: {e}")

          with open('warning.json', 'w', encoding='utf-8') as f:
              json.dump(warning_result, f, ensure_ascii=False, indent=2)

      - name: amedas.json 生成（沖縄主要観測点）
        run: |
          echo '' | base64 -d > /tmp/amedas.py
          python3 /tmp/amedas.py

      - name: flight.json 生成（那覇空港周辺フライト・離島船舶）
        run: |
          echo '' | base64 -d > /tmp/flight.py
          python3 /tmp/flight.py

      - name: コミット・プッシュ
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add img_cam/ cameras.json warning.json kikukuru.json earthquake.json river.json amedas.json flight.json
          git diff --staged --quiet || (git commit -m "🌊 カメラ更新 $(TZ='Asia/Tokyo' date '+%Y-%m-%d %H:%M') JST" && git pull --rebase && git push)
