name: 河川カメラ画像取得

on:
  schedule:
    - cron: '0,5,10,15,20,25,30,35,40,45,50,55 * * * *'
  workflow_dispatch:

jobs:
  fetch-images:
    runs-on: ubuntu-latest
    steps:
      - name: リポジトリをチェックアウト
        uses: actions/checkout@v4

      - name: 画像取得
        run: |
          mkdir -p img_cam

          # ── 沖縄県河川カメラ（p-01〜p-99 自動スキャン）──
          BASE="http://bousai-kasen.pref.okinawa.jp/river/kasen/img_cam"
          for N in $(seq 1 99); do
            PID=$(echo $N | awk '{printf "%02d", $1}')
            curl -sf --max-time 10 --retry 1 \
              -H "Referer: http://bousai-kasen.pref.okinawa.jp/" \
              -H "User-Agent: Mozilla/5.0" \
              -o "img_cam/p-${PID}.jpg" \
              "${BASE}/p-${PID}.jpg" && echo "OK: p-${PID}" || rm -f "img_cam/p-${PID}.jpg"
          done

          # ── 沖縄市水位監視カメラ ──
          curl -sf --max-time 15 --retry 2 -H "User-Agent: Mozilla/5.0" \
            -o "img_cam/okinawa-city-hija.jpg" \
            "https://www.city.okinawa.okinawa.jp/suiikanshi/hijacam/hijacam.jpg" \
            && echo "OK: 比謝川" || echo "NG: 比謝川"
          curl -sf --max-time 15 --retry 2 -H "User-Agent: Mozilla/5.0" \
            -o "img_cam/okinawa-city-awase1.jpg" \
            "https://www.city.okinawa.okinawa.jp/suiikanshi/awasecam01/TRIFORA.jpg" \
            && echo "OK: 泡瀬1" || echo "NG: 泡瀬1"
          curl -sf --max-time 15 --retry 2 -H "User-Agent: Mozilla/5.0" \
            -o "img_cam/okinawa-city-awase2.jpg" \
            "https://www.city.okinawa.okinawa.jp/suiikanshi/awasecam02/TRIFORA.jpg" \
            && echo "OK: 泡瀬2" || echo "NG: 泡瀬2"

          # ── 南部国道事務所 道路カメラ ──
          for N in 01 02 03 04 05; do
            curl -sf --max-time 15 --retry 2 \
              -H "Referer: https://www.dc.ogb.go.jp/nankoku/cctv/${N}.html" \
              -H "User-Agent: Mozilla/5.0" \
              -o "img_cam/road-${N}.jpg" \
              "https://www.dc.ogb.go.jp/nankoku/cctv/images/${N}.jpg" \
              && echo "OK: 国道${N}" || echo "NG: 国道${N}"
          done

          # ── 東村 防災監視カメラ ──
          HIGASHI_BASE="http://www2.vill.higashi.okinawa.jp"
          for CAM in \
            "takae-school:高江小学校" \
            "takae-school-seimon:高江小学校正門" \
            "higashi-port:東漁港" \
            "fkc-park:福地川海浜公園" \
            "center-pbh:中央公民館" \
            "hirugi:慶佐次ふれあいヒルギ公園" \
            "arime-school:有銘小学校グラウンド" \
            "higashi-school:東小中学校"; do
            KEY="${CAM%%:*}"
            LABEL="${CAM##*:}"
            curl -sf --max-time 20 --retry 3 --retry-delay 2 \
              --insecure \
              -H "Referer: ${HIGASHI_BASE}/${KEY}.html" \
              -H "User-Agent: Mozilla/5.0" \
              -o "img_cam/higashi-${KEY}.jpg" \
              "${HIGASHI_BASE}/photo/${KEY}.jpg" \
              && echo "OK: 東村 ${LABEL}" || echo "NG: 東村 ${LABEL}"
          done

          # ── 大宜味村 防災ネットワークカメラ ──
          OGIMI_BASE="http://www-camera.vill.ogimi.lg.jp"
          for CAM in \
            "nousonic:農村環境改善センター" \
            "takazatocc:田嘉里公民館" \
            "ogimiej:大宜味小中学校" \
            "tuhacc:津波公民館" \
            "taihocc:大保公民館" \
            "shioya:旧塩屋小学校" \
            "ogimiejgrd:旧大宜味小学校グラウンド"; do
            KEY="${CAM%%:*}"
            LABEL="${CAM##*:}"
            curl -sf --max-time 20 --retry 3 --retry-delay 2 \
              --insecure \
              -H "Referer: ${OGIMI_BASE}/${KEY}.html" \
              -H "User-Agent: Mozilla/5.0" \
              -o "img_cam/ogimi-${KEY}.jpg" \
              "${OGIMI_BASE}/photo/${KEY}.jpg" \
              && echo "OK: 大宜味村 ${LABEL}" || echo "NG: 大宜味村 ${LABEL}"
          done

      - name: dashboard.json 生成（AMeDAS・河川水位・ダム・キキクル）
        shell: python3 {0}
        run: |
          import json, urllib.request, urllib.parse, re
          from datetime import datetime, timezone, timedelta
          from xml.etree import ElementTree as ET

          JST = timezone(timedelta(hours=9))
          now = datetime.now(JST)
          result = {
              'fetched_jst': now.strftime('%Y-%m-%d %H:%M:%S'),
              'amedas': [],
              'rivers': [],
              'dams': [],
              'kikukuru': [],
          }

          def fetch(url, timeout=15, headers=None):
              req = urllib.request.Request(url, headers=headers or {'User-Agent': 'Mozilla/5.0'})
              with urllib.request.urlopen(req, timeout=timeout) as r:
                  return r.read()

          # ── 気象警報・注意報 ────────────────────────────────────
          CODE_MAP = {
              '10': [('dosa',5)], '11': [('shinsu',5)],
              '12': [('dosa',5),('shinsu',5)],
              '14': [('dosa',2),('shinsu',2)],
              '15': [('kouzui',2)], '16': [('dosa',3)],
              '17': [('kouzui',3)], '37': [('shinsu',3)],
              '38': [('dosa',3),('shinsu',3)],
          }
          AREA_NAMES = {
              '4720100':'那覇市','4720300':'宜野湾市','4720500':'石垣市',
              '4720600':'浦添市','4720700':'名護市','4720800':'糸満市',
              '4720900':'沖縄市','4721100':'豊見城市','4721200':'うるま市',
              '4721300':'宮古島市','4721400':'南城市',
              '4730100':'国頭村','4730200':'大宜味村','4730300':'東村',
              '4730600':'今帰仁村','4730800':'本部町','4731100':'恩納村',
              '4731300':'宜野座村','4731400':'金武町','4731500':'伊江村',
              '4732400':'読谷村','4732500':'嘉手納町','4732600':'北谷町',
              '4732700':'北中城村','4732800':'中城村','4732900':'西原町',
              '4734800':'与那原町','4734900':'南風原町','4735000':'八重瀬町',
              '4735300':'渡嘉敷村','4735400':'座間味村','4735500':'粟国村',
              '4735600':'渡名喜村','4735700':'南大東村','4735800':'北大東村',
              '4735900':'伊平屋村','4736000':'伊是名村','4736100':'久米島町',
              '4737500':'多良間村','4738100':'竹富町','4738200':'与那国町',
          }
          WARN_LABELS = {0:'発表なし', 2:'注意報', 3:'警報', 5:'特別警報'}
          try:
              w_url = 'https://www.jma.go.jp/bosai/warning/data/warning/471000.json'
              w_raw = json.loads(fetch(w_url))
              best_areas = []
              for at in (w_raw.get('areaTypes') or []):
                  areas = at.get('areas') or []
                  if len(areas) > len(best_areas):
                      best_areas = areas
              for area in best_areas:
                  code = str(area.get('code',''))
                  name = AREA_NAMES.get(code, '')
                  if not name:
                      continue
                  shinsu = kouzui = dosa = 0
                  for w in (area.get('warnings') or []):
                      wcode  = str(w.get('code',''))
                      status = w.get('status','')
                      if status != '発表':  # '継続'は平常時も存在するので除外
                          continue
                      for cat, lv in CODE_MAP.get(wcode, []):
                          if cat == 'shinsu': shinsu = max(shinsu, lv)
                          elif cat == 'kouzui': kouzui = max(kouzui, lv)
                          elif cat == 'dosa': dosa = max(dosa, lv)
                  max_lv = max(shinsu, kouzui, dosa)
                  result['kikukuru'].append({
                      'area': name, 'shinsu': shinsu, 'kouzui': kouzui,
                      'dosa': dosa, 'level': max_lv,
                      'label': WARN_LABELS.get(max_lv,'発表なし'),
                  })
              alert_count = sum(1 for k in result['kikukuru'] if k['level'] > 0)
              print(f"警報取得完了: {len(result['kikukuru'])}市町村 (発表中: {alert_count}市町村)")
          except Exception as e:
              print(f"警報取得 NG: {type(e).__name__}: {e}")

          # ── キキクル 危険度分布（市区町村単位GeoJSON・gzip対応）────────
          import gzip as gz
          KIKI_COLORS = {0:'平常',1:'注意',2:'警戒',3:'危険',4:'非常に危険',5:'最大級'}

          def fetch_kiki_gz(url):
              import urllib.request as ur
              req = ur.Request(url, headers={
                  'Accept-Encoding': 'gzip, deflate',
                  'User-Agent': 'Mozilla/5.0',
                  'Referer': 'https://www.jma.go.jp/bosai/risk/',
              })
              with ur.urlopen(req, timeout=15) as r:
                  raw = r.read()
              if raw[:2] == b'\x1f\x8b':
                  raw = gz.decompress(raw)
              return json.loads(raw)

          def parse_kiki_geojson(geojson, elem_name):
              mp = {}
              features = geojson.get('features') or []
              if features:
                  # 最初のfeatureのpropertyキーを確認
                  sample_props = features[0].get('properties') or {}
                  print(f"キキクル{elem_name} propsキー: {list(sample_props.keys())[:8]}")
              for feature in features:
                  props = feature.get('properties') or {}
                  code = str(props.get('code') or props.get('areaCode') or '')
                  if not code.startswith('47'):
                      continue
                  name = str(props.get('name') or props.get('areaName') or code)
                  # levelキーを複数試す
                  lv = (props.get('level') or props.get('dangerLevel') or
                        props.get('risk') or props.get('rl') or
                        props.get('inundLevel') or props.get('landLevel') or 0)
                  try: lv = int(lv)
                  except: lv = 0
                  if name not in mp or lv > mp[name]:
                      mp[name] = lv
              return mp

          # targetTimesから最新時刻を取得してURLを組み立て
          shinsu_map = {}
          dosa_map   = {}
          kouzui_map = {}
          try:
              tt = json.loads(fetch('https://www.jma.go.jp/bosai/jmatile/data/risk/targetTimes.json'))
              if tt and isinstance(tt, list):
                  l = tt[0]
                  bt, vt, mb = l['basetime'], l['validtime'], l.get('member','none')
                  # elementコード: targetTimesのelementsリストから確認済み
                  # inund=浸水, land=土砂, flood=洪水
                  ELEM_MAP = {'shinsu': 'inund', 'dosa': 'land', 'kouzui': 'flood'}
                  for cat, elem in ELEM_MAP.items():
                      url = f'https://www.jma.go.jp/bosai/jmatile/data/risk/{bt}/{vt}/{mb}/{elem}/surf/municipality_name/data.geojson?id=municipality_name'
                      try:
                          gj = fetch_kiki_gz(url)
                          mp = parse_kiki_geojson(gj, cat)
                          if cat == 'shinsu': shinsu_map = mp
                          elif cat == 'dosa':   dosa_map   = mp
                          elif cat == 'kouzui': kouzui_map = mp
                          alert = sum(1 for v in mp.values() if v > 0)
                          print(f"キキクル{cat}({elem}): {len(mp)}市町村 警戒以上:{alert}")
                      except Exception as e:
                          print(f"キキクル{cat}({elem}) NG: {e}")
                          # fallback: none/none/none パターン
                          url2 = f'https://www.jma.go.jp/bosai/jmatile/data/map/none/none/none/{elem}/municipality_name/data.geojson?id=municipality_name'
                          try:
                              gj2 = fetch_kiki_gz(url2)
                              mp2 = parse_kiki_geojson(gj2, cat+' fallback')
                              if cat == 'shinsu': shinsu_map = mp2
                              elif cat == 'dosa':   dosa_map   = mp2
                              elif cat == 'kouzui': kouzui_map = mp2
                              print(f"キキクル{cat} fallback: {len(mp2)}市町村")
                          except Exception as e2:
                              print(f"キキクル{cat} fallback NG: {e2}")
          except Exception as e:
              print(f"キキクルtargetTimes NG: {e}")

          all_areas = set(shinsu_map) | set(dosa_map) | set(kouzui_map)
          if all_areas:
              result['kikukuru'] = []
              for name in sorted(all_areas):
                  s = shinsu_map.get(name, 0)
                  d = dosa_map.get(name, 0)
                  k = kouzui_map.get(name, 0)
                  max_lv = max(s, d, k)
                  result['kikukuru'].append({
                      'area': name, 'shinsu': s, 'kouzui': k, 'dosa': d,
                      'level': max_lv, 'label': KIKI_COLORS.get(max_lv, '平常'),
                      'source': 'kikukuru',
                  })
              alert = sum(1 for k in result['kikukuru'] if k['level'] >= 1)
              print(f"キキクル合成完了: {len(result['kikukuru'])}市町村 (注意以上: {alert}市町村)")
          else:
              for k in result['kikukuru']:
                  k['source'] = 'warning'
              print(f"キキクル取得失敗: 警報データ{len(result['kikukuru'])}市町村で代替")



          # ── キキクル 危険度分布 URL調査（member付き）──────────────
          import gzip as gz
          def fetch_gz(url):
              import urllib.request as ur
              req = ur.Request(url, headers={
                  'Accept-Encoding': 'gzip, deflate',
                  'User-Agent': 'Mozilla/5.0',
                  'Referer': 'https://www.jma.go.jp/bosai/risk/',
              })
              with ur.urlopen(req, timeout=10) as r:
                  raw = r.read()
              if raw[:2] == b'\x1f\x8b':
                  raw = gz.decompress(raw)
              return raw

          try:
              tt_raw = json.loads(fetch_gz('https://www.jma.go.jp/bosai/jmatile/data/risk/targetTimes.json'))
              latest = tt_raw[0]
              bt = latest['basetime']
              vt = latest['validtime']
              mb = latest.get('member', 'none')
              print(f"最新: bt={bt} vt={vt} member={mb}")
              for url_tmpl in [
                  f'https://www.jma.go.jp/bosai/jmatile/data/risk/{bt}/{vt}/{mb}/surf/municipality/471000/contents.json',
                  f'https://www.jma.go.jp/bosai/jmatile/data/risk/{bt}/{vt}/{mb}/surf/municipality/47/contents.json',
                  f'https://www.jma.go.jp/bosai/jmatile/data/risk/{bt}/{vt}/{mb}/surf/471000/contents.json',
                  f'https://www.jma.go.jp/bosai/jmatile/data/risk/{bt}/{mb}/surf/municipality/471000/contents.json',
                  f'https://www.jma.go.jp/bosai/jmatile/data/risk/{bt}/{vt}/{mb}/land/municipality/471000/contents.json',
                  f'https://www.jma.go.jp/bosai/jmatile/data/risk/{bt}/{vt}/{mb}/inund/municipality/471000/contents.json',
              ]:
                  try:
                      r = fetch_gz(url_tmpl)
                      path_short = url_tmpl.split('risk/')[1][:90]
                      print(f"成功: {path_short}")
                      print(f"  先頭500bytes: {r[:500]!r}")
                      break
                  except Exception as eu:
                      path_short = url_tmpl.split('risk/')[1][:90]
                      print(f"  失敗: {path_short} → {eu}")
          except Exception as e:
              print(f"キキクルURL調査NG: {type(e).__name__}: {e}")
          with open('dashboard.json', 'w', encoding='utf-8') as f:
              json.dump(result, f, ensure_ascii=False, indent=2)
          print(f"dashboard.json 生成完了 / AMeDAS:{len(result['amedas'])} 河川:{len(result['rivers'])} ダム:{len(result['dams'])} キキクル:{len(result['kikukuru'])}")

      - name: YouTube ライブID取得 + cameras.json + warning.json 生成
        env:
          YOUTUBE_API_KEY: ${{ secrets.YOUTUBE_API_KEY }}
        shell: python3 {0}
        run: |
          import json, os, glob, urllib.request, urllib.parse
          from datetime import datetime, timezone, timedelta

          JST = timezone(timedelta(hours=9))
          now = datetime.now(JST)
          API_KEY = os.environ.get('YOUTUBE_API_KEY', '')

          def yt_api(endpoint, params):
              params['key'] = API_KEY
              url = "https://www.googleapis.com/youtube/v3/" + endpoint + "?" + urllib.parse.urlencode(params)
              try:
                  with urllib.request.urlopen(url, timeout=10) as r:
                      return json.loads(r.read())
              except Exception as e:
                  print(f"API error ({endpoint}): {e}")
                  return {}

          def get_channel_id(handle):
              handle = handle.lstrip('@')
              data = yt_api('channels', {'part': 'id', 'forHandle': handle})
              items = data.get('items', [])
              return items[0]['id'] if items else None

          def get_live_video_id(channel_id, title_keywords=None):
              data = yt_api('search', {
                  'part': 'id,snippet',
                  'channelId': channel_id,
                  'eventType': 'live',
                  'type': 'video',
                  'maxResults': 10
              })
              items = data.get('items', [])
              if not items:
                  return None
              if title_keywords:
                  for item in items:
                      title = item.get('snippet', {}).get('title', '')
                      if any(kw in title for kw in title_keywords):
                          return item['id']['videoId']
                  return None  # キーワード一致なし
              return items[0]['id']['videoId']

          # チャンネルのみのカメラ（動画IDが定期的に変わるもの）
          CHANNEL_CAMERAS = [
              {'name': '那覇市古島',                    'loc': '那覇市古島',   'channel_id': 'UCsmhYj8SkM1cCcXekuaViAg'},
              {'name': '石垣島730交差点',               'loc': '石垣市美崎町', 'handle': '-ishigakiisland-2224'},
              {'name': '恩納村マリブビーチ',             'loc': '国頭郡恩納村', 'handle': 'now2352'},
              {'name': 'かりゆしビーチリゾート',         'loc': '国頭郡恩納村', 'handle': 'Kariyushi.Hotels'},
              {'name': '石垣島ユーグレナ離島ターミナル', 'loc': '石垣市美崎町', 'handle': '離島ターミナル側LIVEカメラ'},
              {'name': '北谷町砂辺',                    'loc': '中頭郡北谷町', 'handle': 'オーシャンビュー北谷町砂辺宮'},
              {'name': '豊見城市宜保',                  'loc': '豊見城市宜保', 'handle': '豊見城市宜保ライブ'},
              {'name': '比地川（国頭村）',               'loc': '国頭郡国頭村', 'handle': 'jotsu_vision'},
              {'name': '浦添市城間ライブ',               'loc': '浦添市城間',   'handle': '浦添市城間ライブ'},
              {'name': '島尻郡南風原町ライブ',           'loc': '島尻郡南風原町', 'handle': '島尻郡南風原町ライブ'},
              {'name': '沖縄県島尻郡ライブ',             'loc': '島尻郡南風原町', 'handle': '沖縄県島尻郡ライブ'},
              {'name': '与那原ライブ',                   'loc': '島尻郡与那原町', 'handle': '与那原ライブ'},
              {'name': 'うるま市州崎ライブカメラ',         'loc': 'うるま市洲崎',   'handle': 'うるま市州崎ライブカメラ'},
              {'name': '那覇空港（日テレNews）',          'loc': '那覇市鏡水',     'handle': 'ntv_news',
               'title_keywords': ['那覇', '沖縄', '空港', 'なは', 'Naha']},
          ]

          youtube_live = []
          if API_KEY:
              for cam in CHANNEL_CAMERAS:
                  channel_id = cam.get('channel_id')
                  if not channel_id:
                      channel_id = get_channel_id(cam['handle'])
                  if channel_id:
                      video_id = get_live_video_id(channel_id, cam.get('title_keywords'))
                      youtube_live.append({
                          'name': cam['name'],
                          'loc': cam['loc'],
                          'channel_id': channel_id,
                          'video_id': video_id
                      })
                      print(f"{cam['name']}: {'OK ' + video_id if video_id else '配信なし'}")
                  else:
                      youtube_live.append({'name': cam['name'], 'loc': cam['loc'], 'channel_id': None, 'video_id': None})
                      print(f"{cam['name']}: チャンネルID取得失敗")

          # 沖縄県河川カメラ
          cameras = []
          for f in sorted(glob.glob('img_cam/p-*.jpg')):
              pid = os.path.basename(f).replace('p-','').replace('.jpg','')
              if os.path.getsize(f) > 100:
                  cameras.append({'pid': pid, 'size': os.path.getsize(f)})

          # 沖縄市カメラ
          extra_cameras = []
          for cam in [
              {'key': 'okinawa-city-hija',  'name': '比謝川',  'loc': '沖縄市（水位監視）'},
              {'key': 'okinawa-city-awase1', 'name': '泡瀬川①', 'loc': '沖縄市（水位監視）'},
              {'key': 'okinawa-city-awase2', 'name': '泡瀬川②', 'loc': '沖縄市（水位監視）'},
          ]:
              f = f"img_cam/{cam['key']}.jpg"
              if os.path.exists(f) and os.path.getsize(f) > 100:
                  extra_cameras.append({**cam, 'size': os.path.getsize(f)})

          # 国道カメラ
          road_cameras = []
          for cam in [
              {'key': 'road-01', 'name': '①国道58号 読谷村比謝',    'loc': '中頭郡読谷村'},
              {'key': 'road-02', 'name': '②国道329号 中城村久場',   'loc': '中頭郡中城村'},
              {'key': 'road-03', 'name': '③国道329号 西原町小那覇', 'loc': '中頭郡西原町'},
              {'key': 'road-04', 'name': '④国道331号 糸満市摩文仁', 'loc': '糸満市摩文仁'},
              {'key': 'road-05', 'name': '⑤国道332号 那覇市安次嶺', 'loc': '那覇市安次嶺'},
          ]:
              f = f"img_cam/{cam['key']}.jpg"
              if os.path.exists(f) and os.path.getsize(f) > 100:
                  road_cameras.append({**cam, 'size': os.path.getsize(f)})

          # 東村カメラ
          higashi_cameras = []
          for cam in [
              {'key': 'higashi-takae-school',        'name': '高江小学校',           'loc': '東村'},
              {'key': 'higashi-takae-school-seimon', 'name': '高江小学校正門',       'loc': '東村'},
              {'key': 'higashi-higashi-port',        'name': '東漁港',               'loc': '東村'},
              {'key': 'higashi-fkc-park',            'name': '福地川海浜公園',       'loc': '東村'},
              {'key': 'higashi-center-pbh',          'name': '中央公民館',           'loc': '東村'},
              {'key': 'higashi-hirugi',              'name': '慶佐次ふれあいヒルギ公園', 'loc': '東村'},
              {'key': 'higashi-arime-school',        'name': '有銘小学校グラウンド', 'loc': '東村'},
              {'key': 'higashi-higashi-school',      'name': '東小中学校',           'loc': '東村'},
          ]:
              f = f"img_cam/{cam['key']}.jpg"
              if os.path.exists(f) and os.path.getsize(f) > 100:
                  higashi_cameras.append({**cam, 'size': os.path.getsize(f)})

          # 大宜味村カメラ
          ogimi_cameras = []
          for cam in [
              {'key': 'ogimi-nousonic',    'name': '農村環境改善センター',     'loc': '大宜味村'},
              {'key': 'ogimi-takazatocc',  'name': '田嘉里公民館',             'loc': '大宜味村'},
              {'key': 'ogimi-ogimiej',     'name': '大宜味小中学校',           'loc': '大宜味村'},
              {'key': 'ogimi-tuhacc',      'name': '津波公民館',               'loc': '大宜味村'},
              {'key': 'ogimi-taihocc',     'name': '大保公民館',               'loc': '大宜味村'},
              {'key': 'ogimi-shioya',      'name': '旧塩屋小学校',             'loc': '大宜味村'},
              {'key': 'ogimi-ogimiejgrd',  'name': '旧大宜味小学校グラウンド', 'loc': '大宜味村'},
          ]:
              f = f"img_cam/{cam['key']}.jpg"
              if os.path.exists(f) and os.path.getsize(f) > 100:
                  ogimi_cameras.append({**cam, 'size': os.path.getsize(f)})

          result = {
              'last_fetch_jst': now.strftime('%Y-%m-%d %H:%M:%S'),
              'camera_count': len(cameras),
              'cameras': cameras,
              'extra_cameras': extra_cameras,
              'road_cameras': road_cameras,
              'higashi_cameras': higashi_cameras,
              'ogimi_cameras': ogimi_cameras,
              'youtube_live': youtube_live
          }
          with open('cameras.json', 'w', encoding='utf-8') as f:
              json.dump(result, f, ensure_ascii=False, indent=2)

          print(f"河川: {len(cameras)}台 / 沖縄市: {len(extra_cameras)}台 / 国道: {len(road_cameras)}台 / 東村: {len(higashi_cameras)}台 / 大宜味村: {len(ogimi_cameras)}台 / YouTube動的: {len(youtube_live)}件")

          # 気象警報・台風情報の取得
          import urllib.request
          warning_result = {'fetched_jst': now.strftime('%Y-%m-%d %H:%M:%S'), 'warnings': [], 'typhoons': []}
          try:
              req = urllib.request.Request(
                  'https://www.jma.go.jp/bosai/warning/data/warning/471000.json',
                  headers={'User-Agent': 'Mozilla/5.0'}
              )
              with urllib.request.urlopen(req, timeout=15) as r:
                  jma = json.loads(r.read().decode())
              areas = []
              for at in (jma.get('areaTypes') or []):
                  cands = [a for a in (at.get('areas') or []) if any(w.get('status')=='発表' for w in (a.get('warnings') or []))]
                  if cands:
                      areas = cands
                      break
              if not areas:
                  for at in (jma.get('areaTypes') or []):
                      areas.extend(at.get('areas') or [])
              warning_result['warnings'] = [
                  {'area_name': a.get('name',''), 'warnings': a.get('warnings',[])}
                  for a in areas
              ]
              print(f"警報取得: {len(warning_result['warnings'])}地域")
          except Exception as e:
              print(f"警報取得失敗: {e}")

          try:
              req2 = urllib.request.Request(
                  'https://www.jma.go.jp/bosai/typhoon/data/alltyphoon.json',
                  headers={'User-Agent': 'Mozilla/5.0'}
              )
              with urllib.request.urlopen(req2, timeout=15) as r:
                  typhoons_raw = json.loads(r.read().decode())
              warning_result['typhoons'] = [t for t in (typhoons_raw or []) if t.get('active')]
              print(f"台風取得: {len(warning_result['typhoons'])}件")
          except Exception as e:
              print(f"台風取得失敗: {e}")

          with open('warning.json', 'w', encoding='utf-8') as f:
              json.dump(warning_result, f, ensure_ascii=False, indent=2)

      - name: コミット・プッシュ
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add img_cam/ cameras.json warning.json dashboard.json
          git diff --staged --quiet || (git commit -m "🌊 カメラ更新 $(TZ='Asia/Tokyo' date '+%Y-%m-%d %H:%M') JST" && git pull --rebase && git push)
